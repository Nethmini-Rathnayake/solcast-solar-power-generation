# ─────────────────────────────────────────────────────────────────────────────
# Site Configuration — PV Logger System, Sri Lanka
# ─────────────────────────────────────────────────────────────────────────────
# Coordinates for the small PV logger system near University of Moratuwa.
# Model was trained on the large UoM system (~350 kWp) but predictions are
# generated for this 6 kW system; site capacity corrected accordingly.

site:
  name: "PV Logger System"
  latitude: 6.7700           # approximate location
  longitude: 79.8800         # approximate location
  timezone: "Asia/Colombo"   # UTC+05:30, no DST
  elevation_m: 20            # approximate, m above sea level

# ─────────────────────────────────────────────────────────────────────────────
# PV System Physical Parameters
# ─────────────────────────────────────────────────────────────────────────────
# System: residential / small commercial rooftop, 6 kW peak AC output.
# DC nameplate set equal to rated AC peak (DC/AC ratio ≈ 1.0).

  pv_system:
    capacity_kwp: 6.0          # DC nameplate (kWp)
    tilt_deg: 10               # fixed tilt; optimal ~7° at 6.8°N latitude
    azimuth_deg: 180           # 180° = south-facing
    module_type: "crystalline" # pvlib temperature model parameter set
    # PVWatts model parameters
    gamma_pdc: -0.0037         # power temperature coefficient (1/°C); ~-0.37%/°C
    pdc0_kw: 6.0               # DC nameplate power at STC (kW)
    eta_inv_nom: 0.96          # nominal inverter efficiency
    # Cell temperature model (Faiman open-rack crystalline silicon defaults)
    temp_model_params:
      u0: 25.0
      u1: 6.84
